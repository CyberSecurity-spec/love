<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для тебя</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #ffb6c1;
        }

        /* Канвас с матрицей */
        #matrix {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            transition: filter 2s ease, opacity 2s ease;
        }

        /* Класс для размытия фона, когда появляется длинный текст */
        .blur-background {
            filter: blur(8px);
            opacity: 0.3;
            will-change: filter, opacity;
        }

        /* Общий контейнер для текстов */
        .content-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 90%;
            max-width: 600px;
            text-align: center;
            pointer-events: none;
            height: auto;
            max-height: 80vh;
        }

        @media (max-width: 768px) {
            .content-container {
                max-width: 90vw;
                max-height: 70vh;
            }
        }

        @media (max-width: 480px) {
            .content-container {
                max-width: 95vw;
                max-height: 60vh;
            }
        }

        /* Короткое поздравление */
        #intro-message {
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4;
            opacity: 0;
            transition: opacity 1.5s ease;
            position: absolute;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
        }

        #intro-message h1 {
            font-size: clamp(2rem, 8vw, 4rem); /* Адаптивный размер заголовка */
            margin: 0 0 10px 0;
            color: #ff69b4;
        }

        #intro-message p {
            font-size: clamp(1.2rem, 5vw, 2rem);
            margin: 0;
        }

        /* Длинное признание */
        #confession-container {
            opacity: 0;
            transition: opacity 2s ease;
            text-align: left; /* Длинный текст лучше читать с выравниванием по левому краю */
            text-shadow: 0 0 5px #ffb6c1;
            font-size: clamp(1rem, 4.5vw, 1.4rem); /* Адаптивный размер текста */
            line-height: 1.6;
            position: absolute;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
            /* Добавим стильный курсор в конце текста */
            border-right: 2px solid #ff69b4;
            padding-right: 5px;
            animation: blinkCursor 0.75s step-end infinite;
            max-height: 70vh;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            #confession-container {
                font-size: clamp(0.9rem, 4vw, 1.2rem);
                top: 40%;
                max-height: 50vh;
            }
        }

        @media (max-width: 480px) {
            #confession-container {
                font-size: clamp(0.8rem, 3.5vw, 1rem);
                top: 35%;
                max-height: 45vh;
            }
        }

        @keyframes blinkCursor {
            from, to { border-color: transparent; }
            50% { border-color: #ff69b4; }
        }

        /* Вспомогательный класс для отображения элементов */
        .visible {
            opacity: 1 !important;
        }
        .hidden {
            opacity: 0 !important;
        }

        /* Отсчет */
        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            font-size: clamp(4rem, 20vw, 12rem);
            font-weight: bold;
            color: #ff69b4;
            text-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493;
            opacity: 0;
            pointer-events: none;
        }

        @keyframes countdownPulse {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.8);
                filter: drop-shadow(0 0 20px #ff69b4);
            }
            50% {
                filter: drop-shadow(0 0 50px #ff69b4);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.3);
            }
        }

        #countdown.show {
            animation: countdownPulse 1s ease-out forwards;
        }

        /* Видео плеер */
        #video-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 3;
            width: 300px;
            height: 200px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid #ff69b4;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.5);
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 1s ease, transform 1s ease;
            pointer-events: all;
        }

        #video-container.show {
            opacity: 1;
            transform: scale(1);
        }

        #video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Галерея видео */
        #video-gallery {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 3;
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1s ease, transform 1s ease;
            pointer-events: none;
        }

        #video-gallery.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ff69b4;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.5);
        }

        .video-card {
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.2), rgba(255, 20, 147, 0.2));
            border: 2px solid #ff69b4;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ffb6c1;
            font-size: 0.9rem;
            overflow: hidden;
            position: relative;
        }

        .video-card:hover {
            transform: scale(1.05) translateY(-5px);
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.4), rgba(255, 20, 147, 0.4));
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.8);
            border-color: #ff1493;
        }

        .video-card.active {
            background: linear-gradient(135deg, #ff69b4, #ff1493);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 105, 180, 1);
        }

        .video-card-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .video-card-code {
            font-size: 0.8rem;
            opacity: 0.8;
            font-family: 'Courier New', monospace;
        }

        .play-icon {
            margin-top: 10px;
            font-size: 1.5rem;
        }

        @media (max-width: 768px) {
            #video-container {
                width: 280px;
                height: 180px;
                bottom: 250px;
                right: 50%;
                transform: translateX(50%) scale(0.8);
            }

            #video-container.show {
                transform: translateX(50%) scale(1);
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                padding: 15px;
                bottom: 20px;
            }

            #video-gallery {
                bottom: 20px;
                right: 50%;
                transform: translateX(50%) translateY(50px);
                width: 90%;
                max-width: 320px;
            }

            #video-gallery.show {
                transform: translateX(50%) translateY(0);
            }
        }

        @media (max-width: 600px) {
            #video-container {
                width: 85vw;
                height: 50vh;
                max-height: 400px;
                bottom: 50vh;
                right: 50%;
                transform: translateX(50%) scale(0.8);
            }

            #video-container.show {
                transform: translateX(50%) scale(1);
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                padding: 15px;
                width: 85vw;
                max-width: 320px;
            }

            #video-gallery {
                width: 85vw;
                max-width: 320px;
                bottom: 20px;
                right: 50%;
                left: auto;
                transform: translateX(50%) translateY(50px);
            }

            #video-gallery.show {
                transform: translateX(50%) translateY(0);
            }

            .video-card {
                padding: 12px;
                font-size: 0.85rem;
            }

            .video-card-title {
                font-size: 0.95rem;
            }

            .play-icon {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            #video-container {
                width: 90vw;
                height: 60vw;
                max-height: 350px;
                bottom: auto;
                top: 50%;
                right: 50%;
                transform: translate(50%, -50%) scale(0.8);
            }

            #video-container.show {
                transform: translate(50%, -50%) scale(1);
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                padding: 12px;
                width: 90vw;
            }

            #video-gallery {
                width: 90vw;
                max-width: none;
                bottom: 20px;
                top: auto;
                right: 50%;
                left: auto;
                transform: translateX(50%) translateY(50px);
            }

            #video-gallery.show {
                transform: translateX(50%) translateY(0);
            }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="content-container">
        <div id="countdown"></div>
        
        <div id="intro-message">
            <h1>С Днём Рождения!</h1>
            <p>МИЛЕНА ❤️</p>
        </div>

        <div id="confession-container"></div>
    </div>

    <div id="video-container">
        <video id="main-video" controls>
            <source src="0331.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео
        </video>
    </div>

    <div id="video-gallery">
        <div class="gallery-grid">
            <div class="video-card active" data-video="0331.mp4">
                <div class="video-card-title">Воиска Мын Бала</div>
                <div class="video-card-code">VIDEO_001</div>
                <div class="play-icon">▶️</div>
            </div>
            <div class="video-card" data-video="0331(1).mp4">
                <div class="video-card-title">Зверополис 2</div>
                <div class="video-card-code">1:23:07 - 1:23:21</div>
                <div class="play-icon">▶️</div>
            </div>
            <div class="video-card" data-video="0331(2).mp4">
                <div class="video-card-title">Новый Человек Паук : Высокое Напряжение </div>
                <div class="video-card-code">1:45:27 - 1:45:4</div>
                <div class="play-icon">▶️</div>
            </div>
            <div class="video-card" data-video="0331(3).mp4">
                <div class="video-card-title">Анатомия Любви </div>
                <div class="video-card-code">32:49 - 33:32</div>
                <div class="play-icon">▶️</div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. ЛОГИКА МАТРИЦЫ ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        
        let letters = '01'; 
        let fontSize = 16;
        let columns, drops;

        // Функция инициализации холста (важно для адаптивности при повороте телефона)
        function initMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize);
            drops = [];
            for (let x = 0; x < columns; x++) {
                drops[x] = Math.random() * canvas.height; // Случайный старт
            }
        }

        initMatrix();
        window.addEventListener('resize', initMatrix); // Перерисовка при изменении размера окна

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffb6c1';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        let matrixInterval = setInterval(drawMatrix, 33);


        // --- 2. СЦЕНАРИЙ АНИМАЦИИ И ТЕКСТОВ ---
        const introMessage = document.getElementById('intro-message');
        const confessionContainer = document.getElementById('confession-container');
        const countdownEl = document.getElementById('countdown');
        
        // Текст признания
        const longText = "Среди миллиардов строк кода этой вселенной, моя лучшая находка — это ты. До встречи с тобой мой мир был похож на замкнутый цикл без выхода. Ты добавила в него цвета, смысл и эмоции, которые не описать никакими алгоритмами. Ты — самая прекрасная часть моей жизни. Спасибо, что ты есть.";
        
        let i = 0;
        let typingSpeed = 60; // Скорость печатания (мс)

        // Функция эффекта печатной машинки
        function typeWriter() {
            if (i < longText.length) {
                confessionContainer.innerHTML += longText.charAt(i);
                i++;
                setTimeout(typeWriter, typingSpeed);
            } else {
                // Убираем мигающий курсор после завершения печати
                confessionContainer.style.borderRight = "none";
                confessionContainer.style.animation = "none";
                
                // Показываем видео галерею после завершения печати
                setTimeout(() => {
                    const videoGallery = document.getElementById('video-gallery');
                    const videoContainer = document.getElementById('video-container');
                    videoGallery.classList.add('show');
                    videoContainer.classList.add('show');
                }, 800);
            }
        }

        // Обработка выбора видео
        document.querySelectorAll('.video-card').forEach(card => {
            card.addEventListener('click', function() {
                const videoFile = this.getAttribute('data-video');
                const mainVideo = document.getElementById('main-video');
                
                // Обновляем источник видео
                mainVideo.src = videoFile;
                mainVideo.load();
                mainVideo.play();
                
                // Обновляем активное видео
                document.querySelectorAll('.video-card').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Функция отсчета
        function showCountdown() {
            const numbers = [3, 2, 1];
            let index = 0;

            function displayNumber() {
                if (index < numbers.length) {
                    countdownEl.textContent = numbers[index];
                    countdownEl.classList.remove('show');
                    // Триггер для переиспользования класса с анимацией
                    void countdownEl.offsetWidth;
                    countdownEl.classList.add('show');
                    index++;
                    setTimeout(displayNumber, 1000);
                } else {
                    countdownEl.style.display = 'none';
                }
            }

            displayNumber();
        }

        // Запуск последовательности
        setTimeout(() => {
            // Шаг 0: Запускаем отсчет 3-2-1
            showCountdown();

            setTimeout(() => {
                // Шаг 1: Показываем "С Днем Рождения"
                introMessage.classList.add('visible');

                setTimeout(() => {
                    // Шаг 2: Прячем "С Днем Рождения"
                    introMessage.classList.remove('visible');
                    introMessage.classList.add('hidden');

                    setTimeout(() => {
                        // Шаг 3: Замыливаем матрицу и замедляем её (визуальный комфорт)
                        canvas.classList.add('blur-background');
                        clearInterval(matrixInterval);
                        matrixInterval = setInterval(drawMatrix, 80); // Матрица падает медленнее

                        // Шаг 4: Показываем контейнер признания и начинаем печатать
                        confessionContainer.classList.add('visible');
                        typeWriter();

                    }, 1500); // Ждем пока скроется первое сообщение

                }, 4000); // Сколько висит надпись "С Днем Рождения" (4 сек)

            }, 3000); // Отсчет длится 3 сек, потом появляется поздравление

        }, 500); // Пауза перед стартом отсчета

    </script>
</body>
</html>
